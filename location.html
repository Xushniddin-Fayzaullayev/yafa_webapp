<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joylashuv yuborish</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--tg-theme-secondary-bg-color, #f4f4f5);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
    }

    .icon { font-size: 48px; margin-bottom: 16px; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p.subtitle {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .coords {
      background: var(--tg-theme-bg-color, #fff);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
      font-size: 13px;
      text-align: left;
      display: none;
    }

    .coords .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .coords .row:last-child { border-bottom: none; }
    .coords .label { opacity: 0.5; }
    .coords .value { font-weight: 600; }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.75; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-get {
      background: var(--tg-theme-button-color, #2196F3);
      color: var(--tg-theme-button-text-color, #fff);
      margin-bottom: 12px;
    }

    #btn-send {
      background: #4CAF50;
      color: #fff;
      display: none;
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
      opacity: 0.7;
    }

    .status.error { color: #e53935; opacity: 1; }
    .status.success { color: #43a047; opacity: 1; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">📍</div>
  <h1>Joylashuvni yuborish</h1>
  <p class="subtitle">Haydovchi yoki xodim sifatida joriy GPS koordinatangizni serverga yuboring.</p>

  <div class="coords" id="coords-box">
    <div class="row">
      <span class="label">Kenglik</span>
      <span class="value" id="lat">—</span>
    </div>
    <div class="row">
      <span class="label">Uzunlik</span>
      <span class="value" id="lon">—</span>
    </div>
    <div class="row">
      <span class="label">Aniqlik</span>
      <span class="value" id="acc">—</span>
    </div>
  </div>

  <button id="btn-get" onclick="getLocation()">📡 Joylashuvni aniqlash</button>
  <button id="btn-send" onclick="sendLocation()">✅ Serverga yuborish</button>

  <div class="status" id="status"></div>
</div>

<script>
  // ── Sozlamalar ──────────────────────────────────────────────
  const SERVER_URL = "https://YOUR_SERVER/webhook/location"; // <-- o'zgartiring
  // ────────────────────────────────────────────────────────────

  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  let coords = null;

  function setStatus(msg, type = "") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + type;
  }

  function getLocation() {
    const btn = document.getElementById("btn-get");
    btn.disabled = true;
    setStatus("GPS aniqlanmoqda...");

    if (!navigator.geolocation) {
      setStatus("Bu brauzer geolokatsiyani qo'llab-quvvatlamaydi.", "error");
      btn.disabled = false;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        coords = {
          latitude:  pos.coords.latitude,
          longitude: pos.coords.longitude,
          accuracy:  pos.coords.accuracy,
          timestamp: new Date().toISOString(),
          user_id:   tg?.initDataUnsafe?.user?.id ?? null,
          username:  tg?.initDataUnsafe?.user?.username ?? null,
          full_name: [
            tg?.initDataUnsafe?.user?.first_name,
            tg?.initDataUnsafe?.user?.last_name
          ].filter(Boolean).join(" ") || null,
        };

        document.getElementById("lat").textContent = coords.latitude.toFixed(6);
        document.getElementById("lon").textContent = coords.longitude.toFixed(6);
        document.getElementById("acc").textContent = coords.accuracy.toFixed(1) + " m";
        document.getElementById("coords-box").style.display = "block";
        document.getElementById("btn-send").style.display = "block";

        setStatus("Joylashuv topildi!", "success");
        btn.disabled = false;
      },
      (err) => {
        const messages = {
          1: "Ruxsat berilmadi. Brauzer sozlamalaridan joylashuvga ruxsat bering.",
          2: "GPS signali topilmadi.",
          3: "Vaqt tugadi. Qayta urinib ko'ring.",
        };
        setStatus(messages[err.code] ?? "Xatolik yuz berdi.", "error");
        btn.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  async function sendLocation() {
    if (!coords) return;

    const btn = document.getElementById("btn-send");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Yuborilmoqda...';
    setStatus("");

    try {
      const res = await fetch(SERVER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        // Telegram initData ni ham yuboramiz — server tomonida tekshirish uchun
        body: JSON.stringify({
          ...coords,
          init_data: tg?.initData ?? "",
        }),
      });

      if (!res.ok) throw new Error(`Server: ${res.status}`);

      setStatus("Joylashuv muvaffaqiyatli yuborildi! ✅", "success");
      btn.innerHTML = "✅ Yuborildi";

      // Mini App ni yopish (ixtiyoriy)
      setTimeout(() => tg?.close(), 1500);

    } catch (err) {
      setStatus("Yuborishda xatolik: " + err.message, "error");
      btn.disabled = false;
      btn.innerHTML = "✅ Serverga yuborish";
    }
  }
</script>

</body>
</html>
