<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yafa - Davomat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js/dist/face-api.min.js"></script>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding-top: 40px;
      background: #f5f5f5;
      margin: 0;
    }
    h2 { color: #222; margin-bottom: 5px; }
    p { color: #666; }
  </style>
</head>
<body>
  <h2>Salom, Yafa!</h2>
  <p id="tg-status" style="font-size: 12px; color: #aaa;">Tekshirilmoqda...</p>

  <!-- ID + Keldim/Ketdim formasi - faqat QR orqali kirilganda ko'rinadi -->
  <div id="login-form" style="display: none; margin-top: 30px; max-width: 280px; margin-left: auto; margin-right: auto;">
    <p style="font-weight: bold; color: #222;">Davomat ma'lumotlari</p>

    <label style="display: block; text-align: left; font-size: 14px; color: #444; margin-bottom: 4px;">Xodim ID raqami</label>
    <input id="employee-id-input" type="text" inputmode="numeric" placeholder="Masalan: 123"
      style="width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 14px;">

    <label style="display: block; text-align: left; font-size: 14px; color: #444; margin-bottom: 4px;">Amal turi</label>
    <select id="turi-select" style="width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 18px;">
      <option value="keldi">✅ Keldim</option>
      <option value="ketdi">🚪 Ketdim</option>
    </select>

    <p id="form-error" style="color: #e74c3c; font-size: 13px; min-height: 16px;"></p>

    <button id="continue-btn" style="width: 100%; font-size: 17px; padding: 12px; background: #2481cc; color: white; border: none; border-radius: 8px;">
      Davom etish
    </button>
  </div>

  <!-- Asosiy oqim (GPS + kamera) - forma to'ldirilgandan keyin, yoki Telegram orqali avtomatik ko'rinadi -->
  <div id="main-flow" style="display: none;">
    <p id="main-status" style="font-size: 19px; font-weight: bold; color: #222; margin-top: 30px;">
      📍 Joylashuv tekshirilmoqda...
    </p>
    <p id="debug-info" style="font-size: 12px; color: #999;"></p>
    <p id="model-status" style="font-size: 13px; color: #999;">Model yuklanmoqda...</p>

    <div id="face-circle" style="width: 260px; height: 260px; border-radius: 50%; overflow: hidden; border: 6px solid #ccc; margin: 15px auto; display: none; position: relative; transition: border-color 0.25s;">
      <video id="video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <div style="margin-top: 15px;">
      <img id="photo" style="width: 260px; height: 260px; object-fit: cover; border-radius: 50%; display: none; margin: 0 auto;">
    </div>
  </div>

  <script>
    // ===== Telegram WebApp ishga tushirish =====
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      document.getElementById('tg-status').textContent = 'Telegram WebApp aniqlandi ✅';
    } else {
      document.getElementById('tg-status').textContent = 'Browser orqali ochilgan (Telegram tashqarisida)';
    }

    // ===== Ish joyi koordinatasi - QR kod ichida (har korxona uchun alohida QR) =====
    const urlParams = new URLSearchParams(window.location.search);
    const targetLat = parseFloat(urlParams.get('lat')) || 42.114050;   // TEST qiymat
    const targetLng = parseFloat(urlParams.get('lng')) || 60.059947;   // TEST qiymat
    const radius = parseFloat(urlParams.get('radius')) || 200;          // metr, TEST qiymat

    // ===== Xodim ID va amal turi - har doim QR sahifasida qo'lda kiritiladi =====
    let employeeId = null;
    let amalTuri = null;

    function asosiyOqimniBoshla() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('main-flow').style.display = 'block';
      boshla();
    }

    document.getElementById('continue-btn').addEventListener('click', () => {
      const kiritilganId = document.getElementById('employee-id-input').value.trim();
      const tanlanganTuri = document.getElementById('turi-select').value;
      const xato = document.getElementById('form-error');

      if (!kiritilganId) {
        xato.textContent = 'Iltimos, ID raqamingizni kiriting';
        return;
      }

      xato.textContent = '';
      employeeId = kiritilganId;
      amalTuri = tanlanganTuri;
      asosiyOqimniBoshla();
    });

    // Sahifa ochilganda - har doim forma ko'rsatiladi (yagona yo'l: QR)
    document.getElementById('login-form').style.display = 'block';

    // ===== Ikki koordinata orasidagi masofa (metr) - Haversine formula =====
    function masofaHisobla(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    // ===== Yuz aniqlash modelini yuklash =====
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js/weights';
    let modelTayyor = false;

    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
      .then(() => {
        modelTayyor = true;
        document.getElementById('model-status').textContent = '';
      })
      .catch(() => {
        document.getElementById('model-status').textContent = 'Model yuklanmadi, oddiy rejimda davom etamiz';
      });

    // ===== ASOSIY OQIM: sahifa ochilganda avtomatik GPS so'raladi =====
    function boshla() {
      if (!navigator.geolocation) {
        document.getElementById('main-status').textContent = '❌ Bu qurilma GPS qo\'llab-quvvatlamaydi';
        return;
      }

      document.getElementById('main-status').textContent = '📍 Joylashuv tekshirilmoqda...';

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const masofa = masofaHisobla(lat, lng, targetLat, targetLng);

          document.getElementById('debug-info').textContent =
            `(test ma'lumot: masofa ${Math.round(masofa)} metr, ruxsat etilgan radius ${radius} metr)`;

          if (masofa > radius) {
            document.getElementById('main-status').textContent =
              '❌ Siz ish hududida emassiz';
          } else {
            document.getElementById('main-status').textContent = '✅ Hudud tasdiqlandi';
            kameraOch();
          }
        },
        function (error) {
          document.getElementById('main-status').textContent = '❌ GPS xatosi: ' + error.message;
        },
        { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
      );
    }

    // ===== Kamera ochish (GPS tasdiqlangandan keyin avtomatik chaqiriladi) =====
    let kameraStream = null;
    let aniqlashIntervalId = null;
    let yaxshiHolatSoni = 0;

    async function kameraOch() {
      const video = document.getElementById('video');
      const faceCircle = document.getElementById('face-circle');
      const photo = document.getElementById('photo');

      document.getElementById('main-status').textContent = 'Kamera ochilmoqda...';
      photo.style.display = 'none';

      try {
        kameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 720 } },
          audio: false
        });

        video.srcObject = kameraStream;
        faceCircle.style.display = 'block';

        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });
        await video.play();

        document.getElementById('main-status').textContent = 'Yuzingizni doira ichiga, markazga joylashtiring';

        yaxshiHolatSoni = 0;
        aniqlashIntervalId = setInterval(yuzniTekshir, 250);
      } catch (error) {
        document.getElementById('main-status').textContent = 'Kamera xatosi: ' + error.message + ' ❌';
      }
    }

    function halqaRangi(rang) {
      document.getElementById('face-circle').style.borderColor = rang;
    }

    async function yuzniTekshir() {
      const video = document.getElementById('video');

      if (!modelTayyor || !video.videoWidth) {
        halqaRangi('#ccc');
        return;
      }

      const detection = await faceapi.detectSingleFace(
        video,
        new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })
      );

      if (!detection) {
        halqaRangi('#e74c3c');
        yaxshiHolatSoni = 0;
        document.getElementById('main-status').textContent = 'Yuzingiz ko\'rinmayapti — kameraga qarang';
        return;
      }

      const box = detection.box;
      const videoW = video.videoWidth;
      const videoH = video.videoHeight;

      const faceCenterX = box.x + box.width / 2;
      const faceCenterY = box.y + box.height / 2;
      const markazdanFarqX = Math.abs(faceCenterX - videoW / 2) / videoW;
      const markazdanFarqY = Math.abs(faceCenterY - videoH / 2) / videoH;
      const yuzNisbati = box.width / videoW;

      const markazda = markazdanFarqX < 0.18 && markazdanFarqY < 0.18;
      const masofaTogri = yuzNisbati > 0.22 && yuzNisbati < 0.75;

      if (markazda && masofaTogri) {
        halqaRangi('#2ecc71');
        document.getElementById('main-status').textContent = 'Ajoyib! Joyida turing...';
        yaxshiHolatSoni++;

        if (yaxshiHolatSoni >= 4) {
          clearInterval(aniqlashIntervalId);
          rasmOl();
        }
      } else {
        halqaRangi('#f1c40f');
        yaxshiHolatSoni = 0;
        if (!masofaTogri && yuzNisbati <= 0.22) {
          document.getElementById('main-status').textContent = 'Biroz yaqinroq keling';
        } else if (!masofaTogri) {
          document.getElementById('main-status').textContent = 'Biroz uzoqroq turing';
        } else {
          document.getElementById('main-status').textContent = 'Yuzingizni markazga joylashtiring';
        }
      }
    }

    function rasmOl() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const photo = document.getElementById('photo');
      const faceCircle = document.getElementById('face-circle');

      if (!video.videoWidth || !video.videoHeight) {
        document.getElementById('main-status').textContent = 'Video hali tayyor emas ❌';
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      photo.src = dataUrl;
      photo.style.display = 'block';
      halqaRangi('#2ecc71');

      if (kameraStream) {
        kameraStream.getTracks().forEach(track => track.stop());
      }
      faceCircle.style.display = 'none';
      document.getElementById('main-status').textContent = 'Rasmga olindi ✅ (keyingi qadamda yuboriladi)';
    }

  </script>
</body>
</html>
