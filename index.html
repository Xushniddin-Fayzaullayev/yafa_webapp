<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yafa - Davomat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding-top: 50px;
      background: #f5f5f5;
      margin: 0;
    }
    h2 { color: #222; }
    p { color: #666; }
  </style>
</head>
<body>
  <h2>Salom, Yafa!</h2>
  <p id="status">Tekshirilmoqda...</p>
  <p id="gps-status">GPS so'ralmoqda...</p>
  <div id="gps-result" style="font-size: 14px; color: #333; margin-top: 20px;"></div>

  <script>
    // Telegram WebApp ishga tushirish
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      document.getElementById('status').textContent = 'Telegram WebApp aniqlandi ✅';
    } else {
      document.getElementById('status').textContent = 'Bu sahifa browser orqali ochilgan (Telegram tashqarisida)';
    }

    // GPS koordinata olish
    function gpsOl() {
      if (!navigator.geolocation) {
        document.getElementById('gps-status').textContent = 'Bu qurilma GPS qo\'llab-quvvatlamaydi ❌';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;
          // isMocked faqat Android Chrome'da mavjud, boshqa qurilmalarda undefined bo'ladi
          const isMocked = position.coords.hasOwnProperty('isMocked') ? position.coords.isMocked : 'mavjud emas (iOS/boshqa)';

          document.getElementById('gps-status').textContent = 'GPS olindi ✅';
          document.getElementById('gps-result').innerHTML = `
            <p>Latitude: ${lat}</p>
            <p>Longitude: ${lng}</p>
            <p>Aniqlik: ${accuracy} metr</p>
            <p>isMocked: ${isMocked}</p>
          `;
        },
        function(error) {
          document.getElementById('gps-status').textContent = 'GPS xatosi: ' + error.message + ' ❌';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    gpsOl();
  </script>
</body>
</html>
