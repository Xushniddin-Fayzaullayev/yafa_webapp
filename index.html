<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yafa - Davomat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js/dist/face-api.min.js"></script>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding-top: 50px;
      background: #f5f5f5;
      margin: 0;
    }
    h2 { color: #222; }
    p { color: #666; }
  </style>
</head>
<body>
  <h2>Salom, Yafa!</h2>
  <p id="status">Tekshirilmoqda...</p>

  <button id="gps-btn" style="font-size: 18px; padding: 12px 24px; background: #2481cc; color: white; border: none; border-radius: 8px; margin-top: 20px;">
    📍 GPS olish
  </button>

  <p id="gps-status" style="margin-top: 20px;"></p>
  <div id="gps-result" style="font-size: 14px; color: #333; margin-top: 10px;"></div>

  <hr style="margin: 30px auto; width: 80%; border: none; border-top: 1px solid #ddd;">

  <button id="camera-btn" style="font-size: 18px; padding: 12px 24px; background: #2481cc; color: white; border: none; border-radius: 8px;">
    📷 Kamera ochish
  </button>

  <p id="camera-status" style="margin-top: 15px;"></p>
  <p id="model-status" style="font-size: 13px; color: #999;">Model yuklanmoqda...</p>

  <div id="face-circle" style="width: 260px; height: 260px; border-radius: 50%; overflow: hidden; border: 6px solid #ccc; margin: 15px auto; display: none; position: relative; transition: border-color 0.25s;">
    <video id="video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
  </div>

  <canvas id="canvas" style="display: none;"></canvas>

  <div style="margin-top: 15px;">
    <img id="photo" style="width: 260px; height: 260px; object-fit: cover; border-radius: 50%; display: none;">
  </div>

  <script>
    // Telegram WebApp ishga tushirish
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      document.getElementById('status').textContent = 'Telegram WebApp aniqlandi ✅';
    } else {
      document.getElementById('status').textContent = 'Bu sahifa browser orqali ochilgan (Telegram tashqarisida)';
    }

    // GPS koordinata olish - faqat tugma bosilganda
    function gpsOl() {
      if (!navigator.geolocation) {
        document.getElementById('gps-status').textContent = 'Bu qurilma GPS qo\'llab-quvvatlamaydi ❌';
        return;
      }

      document.getElementById('gps-status').textContent = 'GPS so\'ralmoqda... (ruxsat oynasini kutyapmiz)';

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;
          // isMocked faqat Android Chrome'da mavjud, boshqa qurilmalarda undefined bo'ladi
          const isMocked = position.coords.hasOwnProperty('isMocked') ? position.coords.isMocked : 'mavjud emas (iOS/boshqa)';

          document.getElementById('gps-status').textContent = 'GPS olindi ✅';
          document.getElementById('gps-result').innerHTML = `
            <p>Latitude: ${lat}</p>
            <p>Longitude: ${lng}</p>
            <p>Aniqlik: ${accuracy} metr</p>
            <p>isMocked: ${isMocked}</p>
          `;
        },
        function(error) {
          document.getElementById('gps-status').textContent = 'GPS xatosi: ' + error.message + ' ❌';
        },
        { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
      );
    }

    document.getElementById('gps-btn').addEventListener('click', gpsOl);

    // ===== Yuz aniqlash modelini yuklash =====
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js/weights';
    let modelTayyor = false;

    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
      .then(() => {
        modelTayyor = true;
        document.getElementById('model-status').textContent = '';
      })
      .catch((err) => {
        document.getElementById('model-status').textContent = 'Model yuklanmadi, oddiy rejimda davom etamiz';
      });

    // Kamera ochish
    let kameraStream = null;
    let aniqlashIntervalId = null;
    let yaxshiHolatSoni = 0; // ketma-ket nechta tekshiruvda yuz to'g'ri joylashgan

    async function kameraOch() {
      const video = document.getElementById('video');
      const faceCircle = document.getElementById('face-circle');
      const cameraBtn = document.getElementById('camera-btn');
      const photo = document.getElementById('photo');

      document.getElementById('camera-status').textContent = 'Kamera ochilmoqda... (ruxsat oynasini kutyapmiz)';
      photo.style.display = 'none';

      try {
        kameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 720 } },
          audio: false
        });

        video.srcObject = kameraStream;
        faceCircle.style.display = 'block';
        document.getElementById('camera-status').textContent = 'Video yuklanmoqda...';

        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });
        await video.play();

        cameraBtn.style.display = 'none';
        document.getElementById('camera-status').textContent = 'Yuzingizni doira ichiga, markazga joylashtiring';

        yaxshiHolatSoni = 0;
        aniqlashIntervalId = setInterval(yuzniTekshir, 250);
      } catch (error) {
        document.getElementById('camera-status').textContent = 'Kamera xatosi: ' + error.message + ' ❌';
      }
    }

    // Halqa rangini o'zgartirish
    function halqaRangi(rang) {
      document.getElementById('face-circle').style.borderColor = rang;
    }

    // Har 250ms da yuzni tekshirish va halqa rangini yangilash
    async function yuzniTekshir() {
      const video = document.getElementById('video');

      if (!modelTayyor || !video.videoWidth) {
        halqaRangi('#ccc'); // kulrang - hali tayyor emas
        return;
      }

      const detection = await faceapi.detectSingleFace(
        video,
        new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })
      );

      if (!detection) {
        halqaRangi('#e74c3c'); // qizil - yuz topilmadi
        yaxshiHolatSoni = 0;
        document.getElementById('camera-status').textContent = 'Yuzingiz ko\'rinmayapti — kameraga qarang';
        return;
      }

      const box = detection.box;
      const videoW = video.videoWidth;
      const videoH = video.videoHeight;

      // Yuz markazi va o'lchami nisbatlarini hisoblash
      const faceCenterX = box.x + box.width / 2;
      const faceCenterY = box.y + box.height / 2;
      const markazdanFarqX = Math.abs(faceCenterX - videoW / 2) / videoW;
      const markazdanFarqY = Math.abs(faceCenterY - videoH / 2) / videoH;
      const yuzNisbati = box.width / videoW; // yuz qanchalik katta/yaqin ko'rinadi

      const markazda = markazdanFarqX < 0.18 && markazdanFarqY < 0.18;
      const masofaTogri = yuzNisbati > 0.22 && yuzNisbati < 0.75;

      if (markazda && masofaTogri) {
        halqaRangi('#2ecc71'); // yashil - hammasi joyida
        document.getElementById('camera-status').textContent = 'Ajoyib! Joyida turing...';
        yaxshiHolatSoni++;

        // 4 marta ketma-ket (taxminan 1 soniya) yashil bo'lsa - avtomatik suratga olamiz
        if (yaxshiHolatSoni >= 4) {
          clearInterval(aniqlashIntervalId);
          rasmOl();
        }
      } else {
        halqaRangi('#f1c40f'); // sariq - yuz topildi, lekin joylashish noto'g'ri
        yaxshiHolatSoni = 0;
        if (!masofaTogri && yuzNisbati <= 0.22) {
          document.getElementById('camera-status').textContent = 'Biroz yaqinroq keling';
        } else if (!masofaTogri) {
          document.getElementById('camera-status').textContent = 'Biroz uzoqroq turing';
        } else {
          document.getElementById('camera-status').textContent = 'Yuzingizni markazga joylashtiring';
        }
      }
    }

    // Rasmga olish (avtomatik chaqiriladi, qo'lda tugma yo'q)
    function rasmOl() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const photo = document.getElementById('photo');
      const faceCircle = document.getElementById('face-circle');

      if (!video.videoWidth || !video.videoHeight) {
        document.getElementById('camera-status').textContent = 'Video hali tayyor emas ❌';
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');

      // Video selfie ko'rinishida teskari (mirror), lekin saqlanadigan rasm to'g'ri bo'lishi uchun qaytadan o'giramiz
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      photo.src = dataUrl;
      photo.style.display = 'block';
      halqaRangi('#2ecc71');

      // Kamerani o'chirish (batareya/maxfiylik uchun)
      if (kameraStream) {
        kameraStream.getTracks().forEach(track => track.stop());
      }
      faceCircle.style.display = 'none';
      document.getElementById('camera-btn').style.display = 'inline-block';
      document.getElementById('camera-btn').textContent = '📷 Qaytadan olish';
      document.getElementById('camera-status').textContent = 'Rasmga olindi ✅';
    }

    document.getElementById('camera-btn').addEventListener('click', kameraOch);
  </script>
</body>
</html>
