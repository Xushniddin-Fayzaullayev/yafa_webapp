<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yafa - Davomat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding-top: 50px;
      background: #f5f5f5;
      margin: 0;
    }
    h2 { color: #222; }
    p { color: #666; }
  </style>
</head>
<body>
  <h2>Salom, Yafa!</h2>
  <p>Bu test sahifa. Railway orqali ishlayapti.</p>
  <p id="status">Tekshirilmoqda...</p>

  <script>
    // Telegram WebApp ishga tushirish
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      document.getElementById('status').textContent = 'Telegram WebApp aniqlandi ✅';
    } else {
      document.getElementById('status').textContent = 'Bu sahifa browser orqali ochilgan (Telegram tashqarisida)';
    }
  </script>
</body>
</html>
